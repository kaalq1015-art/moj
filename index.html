<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ألعاب ووردل</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
*{font-family:'Tajawal',sans-serif;box-sizing:border-box;}
:root{--correct-color:#4a9e52;--present-color:#c9a227;--absent-color:#3a3a3c;--default-color:#565758;--bg-color:#121213;--surface-color:#18181a;--text-color:#ffffff;--text-muted:#818384;--border-color:#3a3a3c;--border-hover:#565758;--header-border:#272729;}
.light-mode{--correct-color:#6aaa64;--present-color:#c9b458;--absent-color:#787c7e;--default-color:#d3d6da;--bg-color:#ffffff;--surface-color:#f8f9fa;--text-color:#1a1a1b;--text-muted:#787c7e;--border-color:#d3d6da;--border-hover:#878a8c;--header-border:#d3d6da;}
body{background-color:var(--bg-color);color:var(--text-color);transition:background-color 0.3s ease, color 0.3s ease;margin:0;padding:0;min-height:100dvh;display:flex;flex-direction:column;}
header{padding:10px 16px;border-bottom:1px solid var(--header-border);background-color:var(--bg-color);display:flex;justify-content:space-between;align-items:center;height:50px;}
h1{font-size:1.4rem;font-weight:700;letter-spacing:0.02em;margin:0;}
.game-card{background-color:var(--surface-color);border:1px solid var(--border-color);border-radius:12px;padding:30px 20px;text-align:center;transition:all 0.25s ease;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:280px;position:relative;overflow:hidden;}
.game-card::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:transparent;transition:background 0.3s ease;}
.card-words:hover{border-color:var(--correct-color);transform:translateY(-4px);box-shadow:0 8px 24px rgba(74,158,82,0.1);}
.card-words:hover::before{background:var(--correct-color);}
.card-numbers:hover{border-color:var(--present-color);transform:translateY(-4px);box-shadow:0 8px 24px rgba(201,162,39,0.1);}
.card-numbers:hover::before{background:var(--present-color);}
.game-icon{font-size:2rem;color:var(--text-color);transition:transform 0.3s ease, color 0.3s ease;}
.card-words:hover .game-icon{color:var(--correct-color);transform:scale(1.05);}
.card-numbers:hover .game-icon{color:var(--present-color);transform:scale(1.05);}
.game-title{font-size:1.2rem;font-weight:700;color:var(--text-color);}
.game-desc{font-size:0.85rem;color:var(--text-muted);line-height:1.4;}
.mini-tiles{display:flex;gap:4px;margin-top:8px;}
.mini-tile{width:22px;height:22px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#ffffff;}
.bg-correct{background-color:var(--correct-color);}
.bg-present{background-color:var(--present-color);}
.bg-absent{background-color:var(--absent-color);}
.light-mode .mini-tile{color:#ffffff;}
.light-mode .bg-absent{background-color:var(--absent-color);}
#themeToggle{background:none;border:none;color:var(--text-color);cursor:pointer;display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;transition:background-color 0.2s ease;}
#themeToggle:hover{background-color:var(--border-color);}
</style>
</head>
<body>

<header>
    <div class="w-8"></div>
    <h1>ألعاب ووردل</h1>
    <button id="themeToggle">
        <i class="fas fa-sun text-lg"></i>
    </button>
</header>

<main class="flex-1 flex flex-col items-center justify-center p-4 w-full">
    <div class="text-center mb-10">
        <h2 class="text-xl sm:text-2xl font-bold mb-2">اختر تحدي اليوم</h2>
        <p class="text-[var(--text-muted)] text-sm">بين الأرقام والحروف، مساحتك للتفكير.</p>
    </div>

    <div class="flex flex-col sm:flex-row gap-5 w-full justify-center items-center">
        <a href="words.html" class="game-card card-words">
            <div class="game-icon"><i class="fas fa-language"></i></div>
            <div class="game-title">ووردل الحروف</div>
            <div class="game-desc">خمن الكلمة المكونة من 5 حروف في 6 محاولات فقط.</div>
            <div class="mini-tiles">
                <div class="mini-tile bg-correct">ك</div>
                <div class="mini-tile bg-present">ل</div>
                <div class="mini-tile bg-absent">م</div>
                <div class="mini-tile bg-absent">ا</div>
                <div class="mini-tile bg-correct">ت</div>
            </div>
        </a>

        <a href="numbers.html" class="game-card card-numbers">
            <div class="game-icon"><i class="fas fa-hashtag"></i></div>
            <div class="game-title">ووردل الأرقام</div>
            <div class="game-desc">خمن الرقم السري المكون من 5 خانات بذكاء ومنطق.</div>
            <div class="mini-tiles">
                <div class="mini-tile bg-correct">1</div>
                <div class="mini-tile bg-absent">2</div>
                <div class="mini-tile bg-present">3</div>
                <div class="mini-tile bg-correct">4</div>
                <div class="mini-tile bg-absent">5</div>
            </div>
        </a>
    </div>
</main>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const icon = themeToggle.querySelector('i');
    const savedTheme = localStorage.getItem('numberle_theme');
    
    if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        icon.className = 'fas fa-moon text-lg';
    }

    themeToggle.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-mode');
        icon.className = isLight ? 'fas fa-moon text-lg' : 'fas fa-sun text-lg';
        localStorage.setItem('numberle_theme', isLight ? 'light' : 'dark');
    });
</script>

</body>
</html>
