<!DOCTYPE html>

<html lang="ar" dir="rtl"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة إدخال بيانات الوكيل</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 18px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
        .btn { grid-column: span 2; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #2980b9; }
        .output-box { margin-top: 25px; display: none; }
        textarea { width: 100%; height: 180px; background: #1e293b; color: #4ade80; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; direction: ltr; resize: none; border: none; outline: none; }
        .success-msg { color: #27ae60; font-size: 13px; font-weight: bold; text-align: center; margin-bottom: 10px; display: none; }
        .info-text { font-size: 12px; color: #7f8c8d; margin-top: 5px; grid-column: span 2; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h1>إدخال بيانات الوكيل </h1>
    <div class="grid">
        <div>
            <label>نوع الهوية</label>
            <select id="f_type">
                <option value="1">هوية وطنية</option>
                <option value="2">إقامة</option>
            </select>
        </div>
        <div><label>رقم الهوية</label><input type="text" id="f_id" placeholder="مثال: 1000000000"></div>
        <div><label>تاريخ الميلاد (سنة-شهر-يوم)</label><input type="text" id="f_dob" placeholder="1400-01-01"></div>
        <div><label>رقم الوكالة</label><input type="text" id="f_poa"></div>
        <div><label>رقم الجوال (بدون 0)</label><input type="text" id="f_mob" placeholder="5xxxxxxx"></div>
        <div><label>البريد الإلكتروني</label><input type="email" id="f_mail"></div>
        <button class="btn" onclick="generate()">توليد ونسخ الكود</button>
        <p class="info-text">سيتم ملء البيانات والضغط على زر "التحقق" تلقائياً</p>
    </div>

    <div class="output-box" id="out_section">
        <div id="copy_status" class="success-msg">تم التوليد والنسخ! ✅</div>
        <textarea id="out_code" readonly=""></textarea>
    </div>
</div>

<script>
    function generate() {
        try {
            const d = {
                t: document.getElementById('f_type').value,
                tn: document.getElementById('f_type').options[document.getElementById('f_type').selectedIndex].text,
                id: document.getElementById('f_id').value.trim(),
                db: document.getElementById('f_dob').value.trim(),
                po: document.getElementById('f_poa').value.trim(),
                mo: "+966" + document.getElementById('f_mob').value.trim().replace(/^(00966|966|0|\+966)/, ''),
                ma: document.getElementById('f_mail').value.trim()
            };

            const script = `(function(){
const f=(s,v)=>{
const e=document.querySelector(s);
if(!e)return;
e.focus();
const p=Object.getPrototypeOf(e);
const set=Object.getOwnPropertyDescriptor(p,"value")?.set;
if(set)set.call(e,v);else e.value=v;
e.dispatchEvent(new Event('input',{bubbles:true}));
e.dispatchEvent(new Event('change',{bubbles:true}));
e.blur();
};
f('input[name="Type"]',"${d.t}");
f('input[name="Identity"]',"${d.id}");
f('input[name="DateOfBirth"]',"${d.db}");
f('input[name="poaNumber"]',"${d.po}");
f('input[name="email"]',"${d.ma}");
f('input[type="tel"]',"${d.mo}");
const l=document.querySelector('.css-1co7f8r-singleValue');
if(l)l.innerText="${d.tn}";

// الانتظار قليلاً ثم الضغط على زر التحقق
setTimeout(() => {
    const btns = Array.from(document.querySelectorAll('button'));
    const verifyBtn = btns.find(b => b.textContent.includes('التحقق من البيانات'));
    if (verifyBtn) {
        verifyBtn.click();
        console.log('تم الضغط على زر التحقق بنجاح');
    } else {
        console.warn('لم يتم العثور على زر التحقق');
    }
}, 600);
})();`;

            const area = document.getElementById('out_code');
            area.value = script;
            document.getElementById('out_section').style.display = 'block';
            
            // نسخ الكود للمحفظة
            area.select();
            document.execCommand('copy');
            
            const status = document.getElementById('copy_status');
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 3000);
        } catch (err) {
            console.error(err);
        }
    }
</script>


</body></html>
