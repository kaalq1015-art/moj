<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعبئة الورثة </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card-container { max-width: 950px; margin: 40px auto; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-top: 6px solid #2563eb; }
        textarea { font-family: monospace; resize: vertical; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="card-container p-6 md:p-10">
    <h1 class="text-3xl font-bold text-slate-800 text-center mb-8">تعبئة الورثة</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <!-- الإعدادات المشتركة -->
        <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-slate-600">الجوال (بدون 0)</label>
            <input type="text" id="mVal" value="" placeholder="مثال: 580121007" class="p-3 border border-slate-300 rounded-lg outline-none focus:border-blue-500">
        </div>
        <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-slate-600">البريد الإلكتروني</label>
            <input type="email" id="eVal" value="" placeholder="example@mail.com" class="p-3 border border-slate-300 rounded-lg outline-none focus:border-blue-500">
        </div>

        <!-- أزرار التحكم بالوقت -->
        <div class="flex flex-col gap-2 p-4 bg-blue-50 rounded-xl border border-blue-100">
            <label class="text-sm font-bold text-blue-800">وقت اختيار (نوع المالك/الهوية)</label>
            <div class="flex items-center gap-3">
                <input type="range" id="selectionDelay" min="1" max="15" value="5" class="w-full" oninput="this.nextElementSibling.innerText = this.value + ' ثواني'">
                <span class="text-sm font-bold text-blue-600 min-w-[60px]">5 ثواني</span>
            </div>
        </div>

        <div class="flex flex-col gap-2 p-4 bg-green-50 rounded-xl border border-green-100">
            <label class="text-sm font-bold text-green-800">وقت انتظار "التحقق"</label>
            <div class="flex items-center gap-3">
                <input type="range" id="verifyDelay" min="1" max="15" value="5" class="w-full" oninput="this.nextElementSibling.innerText = this.value + ' ثواني'">
                <span class="text-sm font-bold text-green-600 min-w-[60px]">5 ثواني</span>
            </div>
        </div>
    </div>

    <!-- إدخال البيانات -->
    <div class="flex flex-col gap-2 mb-6">
        <label class="text-sm font-semibold text-slate-600">قائمة الورثة (الأسماء، الهويات، التواريخ):</label>
        <textarea id="rawInput" placeholder="الصق النص الكامل هنا..." class="p-4 border border-slate-300 rounded-lg outline-none focus:border-blue-500 h-40"></textarea>
    </div>

    <button onclick="generateMasterScript()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-md transition-all active:scale-95 mb-10 text-lg">
        بدء العملية
    </button>

    <!-- منطقة الكود الناتج -->
    <div id="outputArea" class="hidden border-2 border-dashed border-green-400 p-6 rounded-xl bg-green-50">
        <div class="flex items-center justify-between mb-4">
            <span class="text-green-700 font-bold">تم تجهيز الكود بنجاح! ✅</span>
            <button onclick="copyMaster()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 active:scale-95">نسخ الكود</button>
        </div>
        <textarea id="masterCode" readonly class="w-full h-48 bg-slate-900 text-emerald-400 p-4 rounded-lg font-mono text-xs ltr border-none outline-none" style="direction: ltr;"></textarea>
    </div>
</div>

<script>
    let generatedScript = "";

    function generateMasterScript() {
        const text = document.getElementById('rawInput').value;
        if (!text.trim()) return;

        const selD = document.getElementById('selectionDelay').value;
        const verD = document.getElementById('verifyDelay').value;

        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
        const heirs = [];

        for (let i = 0; i < lines.length; i++) {
            if (/^[12]\d{9}$/.test(lines[i])) {
                let name = "غير معروف";
                if (i >= 2 && lines[i-2].length > 5 && !lines[i-2].includes('/') && !lines[i-2].includes('هوية')) {
                    name = lines[i-2];
                } else if (i >= 3) {
                    name = lines[i-3];
                }

                let dob = "";
                for (let j = i; j < Math.min(i + 15, lines.length); j++) {
                    if (/\d{4}\/\d{2}\/\d{2}/.test(lines[j])) {
                        dob = lines[j].replace(/\//g, '-'); 
                        break;
                    }
                }
                if (dob) heirs.push({ name, id: lines[i], dob });
            }
        }

        if (heirs.length === 0) {
            const message = document.createElement('div');
            message.className = "fixed top-5 left-1/2 -translate-x-1/2 bg-red-600 text-white p-4 rounded-lg shadow-lg z-50";
            message.innerText = "يرجى التأكد من لصق البيانات بشكل صحيح.";
            document.body.appendChild(message);
            setTimeout(() => message.remove(), 3000);
            return;
        }

        const mob = "+966" + document.getElementById('mVal').value.trim().replace(/^(00966|966|0|\+966)/, '');
        const mail = document.getElementById('eVal').value.trim();

        generatedScript = `(async function(){
    const owners = ${JSON.stringify(heirs)};
    const config = { mob: "${mob}", mail: "${mail}", selWait: ${selD}*1000, verWait: ${verD}*1000 };
    
    const setVal = (sel, val) => {
        const e = document.querySelector(sel);
        if(!e) return;
        const p = Object.getPrototypeOf(e);
        const st = Object.getOwnPropertyDescriptor(p, "value")?.set;
        if(st) st.call(e, val); else e.value = val;
        ['input', 'change', 'blur'].forEach(t => e.dispatchEvent(new Event(t, { bubbles: true })));
    };

    const wait = (ms) => new Promise(r => setTimeout(r, ms));

    console.log("%c بدء تعبئة الورثة 🤖 ", "background: #2563eb; color: white; font-weight: bold; padding: 5px;");

    for (let i = 0; i < owners.length; i++) {
        const o = owners[i];
        console.log(\`%c [\${i+1}/\${owners.length}] معالجة: \${o.name}\`, "color: #1e293b; font-weight: bold;");
        
        await wait(config.selWait);

        setVal('input[name="Identity"]', o.id);
        setVal('input[name="DateOfBirth"]', o.dob);
        setVal('input[name="email"]', config.mail);
        setVal('input[type="tel"]', config.mob);

        await wait(500);
        const bV = Array.from(document.querySelectorAll('button')).find(b => b.classList.contains('bg-bluerega') || b.innerText.includes('التحقق'));
        if(bV) bV.click();

        await wait(config.verWait);

        if (i < owners.length - 1) {
            const bA = Array.from(document.querySelectorAll('button')).find(b => b.innerText.includes('إضافة مالك جديد'));
            if(bA) {
                bA.click();
                await wait(1000);
            }
        } else {
            console.log("%c اكتملت جميع الأسماء بنجاح! ✅ ", "background: #10b981; color: white; padding: 5px;");
        }
    }
})();`;

        document.getElementById('masterCode').value = generatedScript;
        document.getElementById('outputArea').classList.remove('hidden');
        document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth' });
    }

    function copyMaster() {
        const area = document.getElementById('masterCode');
        area.select();
        document.execCommand('copy');
        
        const message = document.createElement('div');
        message.className = "fixed top-5 left-1/2 -translate-x-1/2 bg-green-600 text-white p-4 rounded-lg shadow-lg z-50";
        message.innerText = "تم نسخ الكود! الصقه في الـ Console بالموقع.";
        document.body.appendChild(message);
        setTimeout(() => message.remove(), 3000);
    }
</script>

</body>
</html>
