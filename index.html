<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ووردلات - تحدي الأونلاين</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
*{font-family:'Tajawal',sans-serif;box-sizing:border-box;}
:root{
    --correct-color:#538d4e;
    --present-color:#b59f3b;
    --absent-color:#3a3a3c;
    --bg-color:#121213;
    --bg-gradient:linear-gradient(180deg,#121213 0%,#050505 100%);
    --surface-color:rgba(30,30,32,0.85);
    --text-color:#ffffff;
    --border-color:rgba(255,255,255,0.1);
    --border-active:rgba(255,255,255,0.2);
    --key-bg:rgba(255,255,255,0.08);
    --key-text:#ffffff;
    --correct-glow:rgba(83,141,78,0.5);
    --present-glow:rgba(181,159,59,0.35);
}
body{
    background:var(--bg-gradient); color:var(--text-color); margin:0; padding:0;
    height:100dvh; display:flex; flex-direction:column; overflow:hidden;
}

/* التخطيط الجديد لجلسة التحدي */
.game-wrapper {
    flex:1; display:flex; flex-direction:column; width:100%; max-width:600px; 
    margin:0 auto; padding:10px; overflow:hidden; gap: 10px;
}

/* مساحة الخصم (الثلث) */
.opponent-area {
    flex: 1; /* يأخذ ثلث المساحة */
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border-color);
    border-radius: 16px; padding: 15px 10px; position: relative;
}
.opponent-badge {
    position: absolute; top: -12px; background: #e74c3c; color: white;
    font-size: 0.75rem; font-weight: 800; padding: 2px 12px; border-radius: 12px;
    box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
}
.opponent-grid { display: flex; flex-direction: column; gap: 4px; }
.opp-row { display: flex; gap: 4px; }
.opp-tile {
    width: 22px; height: 22px; border-radius: 4px;
    background: transparent; border: 1px solid var(--border-color);
    transition: all 0.3s ease;
}
.opp-tile.filled { border-color: rgba(255,255,255,0.3); }
.opp-tile.correct { background: var(--correct-color); border-color: var(--correct-color); box-shadow: 0 0 8px var(--correct-glow); }
.opp-tile.present { background: var(--present-color); border-color: var(--present-color); }
.opp-tile.absent { background: var(--absent-color); border-color: var(--absent-color); }

/* الفاصل بين اللاعبين */
.vs-divider {
    display: flex; align-items: center; justify-content: center; width: 100%; height: 20px;
}
.vs-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); }
.vs-text { margin: 0 10px; font-weight: 800; font-size: 0.8rem; color: rgba(255,255,255,0.5); }

/* مساحة اللاعب (الثلثين) */
.player-area {
    flex: 2; /* يأخذ ثلثي المساحة */
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 5px;
}
.grid-row{display:flex; justify-content:center; gap:6px; margin-bottom:6px;}
.tile{
    width: clamp(45px, 12vw, 60px); height: clamp(45px, 12vw, 60px); 
    border:2px solid var(--border-color); display:flex; align-items:center; 
    justify-content:center; font-size: 1.8rem; font-weight:800; border-radius:8px;
}
.tile.correct{background-color:var(--correct-color);border-color:var(--correct-color);box-shadow:0 0 14px var(--correct-glow);}
.tile.present{background-color:var(--present-color);border-color:var(--present-color);}
.tile.absent{background-color:var(--absent-color);border-color:var(--absent-color);}

/* الكيبورد (نفس الحجم السابق) */
#keyboard { padding-bottom: 10px; }
.keyboard-row{display:flex;justify-content:center;gap:4px;margin-bottom:6px;width:100%;}
.key{
    height:clamp(42px,6vh,58px);min-width:clamp(28px,6vw,43px);
    background-color:var(--key-bg);color:var(--key-text);border:1px solid var(--border-color);
    border-radius:8px;font-weight:700;font-size:clamp(0.85rem,3vw,1.1rem);
    display:flex;align-items:center;justify-content:center;flex:1;
}
.key.wide{min-width:65px;}
.key.enter{background-color:var(--correct-color); font-size:0.8rem;}
.key.backspace{background-color:#9b2335;}
.key.correct{background-color:var(--correct-color);border-color:var(--correct-color);}
.key.present{background-color:var(--present-color);border-color:var(--present-color);}
.key.absent{background-color:var(--absent-color);opacity:0.4;}

/* الهيدر المبسط للتحدي */
header {
    padding:10px 16px; border-bottom:1px solid rgba(255,255,255,0.07);
    display:flex; align-items:center; justify-content:space-between;
}
.score-badge {
    background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px;
    font-size: 0.85rem; font-weight: 700; display: flex; gap: 8px;
}
.score-badge span:first-child { color: var(--correct-color); }
</style>
</head>
<body>

<header>
    <div class="text-sm font-bold opacity-70"><i class="fas fa-flag-checkered mr-2"></i> سباق الوقت</div>
    <div class="score-badge">
        <span>أنت: 0</span> | <span class="text-red-400">الخصم: 1</span>
    </div>
    <button class="bg-red-500/20 text-red-400 px-3 py-1 rounded-lg text-xs font-bold border border-red-500/30">انسحاب</button>
</header>

<div class="game-wrapper">
    
    <div class="opponent-area">
        <div class="opponent-badge">الخصم (Ahmed99)</div>
        <div class="opponent-grid">
            <div class="opp-row">
                <div class="opp-tile absent"></div>
                <div class="opp-tile present"></div>
                <div class="opp-tile absent"></div>
                <div class="opp-tile absent"></div>
                <div class="opp-tile absent"></div>
            </div>
            <div class="opp-row">
                <div class="opp-tile correct"></div>
                <div class="opp-tile present"></div>
                <div class="opp-tile correct"></div>
                <div class="opp-tile absent"></div>
                <div class="opp-tile absent"></div>
            </div>
            <div class="opp-row">
                <div class="opp-tile filled"></div>
                <div class="opp-tile filled"></div>
                <div class="opp-tile filled"></div>
                <div class="opp-tile"></div>
                <div class="opp-tile"></div>
            </div>
            <div class="opp-row"><div class="opp-tile"></div><div class="opp-tile"></div><div class="opp-tile"></div><div class="opp-tile"></div><div class="opp-tile"></div></div>
            <div class="opp-row"><div class="opp-tile"></div><div class="opp-tile"></div><div class="opp-tile"></div><div class="opp-tile"></div><div class="opp-tile"></div></div>
            <div class="opp-row"><div class="opp-tile"></div><div class="opp-tile"></div><div class="opp-tile"></div><div class="opp-tile"></div><div class="opp-tile"></div></div>
        </div>
    </div>

    <div class="vs-divider">
        <div class="vs-line"></div>
        <div class="vs-text">أنت</div>
        <div class="vs-line"></div>
    </div>

    <div class="player-area">
        <div id="grid">
            <div class="grid-row">
                <div class="tile absent">م</div>
                <div class="tile present">ل</div>
                <div class="tile absent">ع</div>
                <div class="tile absent">ب</div>
                <div class="tile absent">ة</div>
            </div>
            <div class="grid-row">
                <div class="tile present">س</div>
                <div class="tile absent">ل</div>
                <div class="tile correct">ا</div>
                <div class="tile absent">م</div>
                <div class="tile absent">ي</div>
            </div>
            <div class="grid-row">
                <div class="tile">ق</div>
                <div class="tile">ا</div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="grid-row"><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div></div>
            <div class="grid-row"><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div></div>
            <div class="grid-row"><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div></div>
        </div>
    </div>

    <div id="keyboard">
        <div class="keyboard-row">
            <div class="key">ج</div><div class="key">ح</div><div class="key">خ</div><div class="key">ه</div><div class="key absent">ع</div><div class="key">غ</div><div class="key">ف</div><div class="key">ق</div><div class="key">ث</div><div class="key">ص</div>
        </div>
        <div class="keyboard-row">
            <div class="key absent">ة</div><div class="key">ك</div><div class="key absent">م</div><div class="key">ن</div><div class="key">ت</div><div class="key correct">ا</div><div class="key present">ل</div><div class="key absent">ب</div><div class="key absent">ي</div><div class="key present">س</div><div class="key">ش</div>
        </div>
        <div class="keyboard-row">
            <div class="key wide enter">Enter</div><div class="key">ض</div><div class="key">و</div><div class="key">ر</div><div class="key">ز</div><div class="key">د</div><div class="key">ذ</div><div class="key">ط</div><div class="key">ظ</div><div class="key wide backspace"><i class="fas fa-backspace"></i></div>
        </div>
    </div>

</div>

</body>
</html>
